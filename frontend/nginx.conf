# Internal-only static server for the Angular build — never reached directly
# by the internet. deploy/nginx.conf (the public, TLS-terminating reverse
# proxy) owns all routing decisions, including /api/*, so this container
# never sees a request path starting with /api/ and has no proxy block of
# its own for it.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — serve index.html for any route Angular's client-side
    # router handles, so refreshing on e.g. /batch doesn't 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
