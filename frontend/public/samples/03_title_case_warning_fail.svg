<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <rect width="400" height="600" fill="#f8f5f0" rx="12"/>
  <rect x="20" y="20" width="360" height="560" fill="none" stroke="#7a5c3a" stroke-width="3" rx="8"/>

  <!-- Brand name -->
  <text x="200" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#3a2010">Blue Ridge</text>
  <line x1="60" y1="135" x2="340" y2="135" stroke="#7a5c3a" stroke-width="1"/>

  <!-- Decorative element -->
  <polygon points="200,155 260,250 140,250" fill="none" stroke="#7a5c3a" stroke-width="2"/>
  <text x="200" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7a5c3a">BLUE RIDGE</text>

  <!-- Class / Type -->
  <text x="200" y="295" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#3a2010">TENNESSEE WHISKEY</text>
  <line x1="60" y1="310" x2="340" y2="310" stroke="#7a5c3a" stroke-width="1"/>

  <!-- Alcohol content -->
  <text x="200" y="345" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5a3c20">45% ALC/VOL (90 PROOF)</text>

  <!-- Net contents -->
  <text x="200" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5a3c20">750 mL</text>

  <!-- Bottler info -->
  <text x="200" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5a3c20">Blue Ridge Distilling Co.</text>
  <text x="200" y="425" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5a3c20">Knoxville TN 37902 USA</text>

  <!-- Government warning — intentionally uses title case "Government Warning:" instead of ALL CAPS -->
  <text x="200" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#1a1a1a">Government Warning: (1) According to the Surgeon General,</text>
  <text x="200" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#1a1a1a">women should not drink alcoholic beverages during pregnancy</text>
  <text x="200" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#1a1a1a">because of the risk of birth defects. (2) Consumption of</text>
  <text x="200" y="496" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#1a1a1a">alcoholic beverages impairs your ability to drive a car or</text>
  <text x="200" y="508" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#1a1a1a">operate machinery, and may cause health problems.</text>
</svg>
