services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    volumes:
      - ..:/workspace:cached           # project root → /workspace (VS Code workspace)
      - uv-cache:/home/vscode/.cache/uv  # persist uv package cache across rebuilds
    ports:
      - "8000:8000"
    env_file:
      - ../.env.dev
    environment:
      VISION_MODEL: openai/gemma3:4b
      OLLAMA_API_BASE: http://ollama:11434/v1
    # depends_on:
    #   ollama:
    #     condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: builder  # stop at builder stage to get dev deps
    command: npm run dev
    volumes:
      - ../frontend:/app
      - /app/node_modules  # don't overwrite installed node_modules with host dir
    ports:
      - "4200:4200"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  # pulls gemma3:4b on first startup (~3 GB, takes a few minutes).
  # Subsequent starts reuse the ollama_data volume so the model isn't re-downloaded.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 8 && ollama pull gemma3:4b-it-qat && wait"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s

volumes:
  ollama_data:
  uv-cache:
