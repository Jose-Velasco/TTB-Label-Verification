version: "3.9"

services:
  # devcontainer:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   volumes:
  #     # Mount the whole repo into /workspace
  #     - ..:/workspace:cached
  #     # Isolate the Python virtual environment similarly
  #     - venv_cache:/workspace/backend/.venv
  #   # sleep infinity keeps the container alive while VS Code is attached
  #   command: sleep infinity
  #   env_file:
  #     - ../.env.dev
  #   environment:
  #     # Point the backend at the ollama sidecar service
  #     OLLAMA_API_BASE: http://ollama:11434/v1
  #   # Persist bash history across container rebuilds
  #   user: vscode
  #   depends_on:
  #     ollama:
  #       condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app  # hot reload
    ports:
      - "8000:8000"
    env_file:
      - ../.env.dev
    environment:
      VISION_MODEL: openai/gemma3:4b
      OLLAMA_API_BASE: http://ollama:11434/v1
    depends_on:
      ollama:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: builder  # stop at builder stage to get dev deps
    command: npm run dev
    volumes:
      - ../frontend:/app
      - /app/node_modules  # don't overwrite installed node_modules with host dir
    ports:
      - "4200:4200"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  # pulls gemma3:4b on first startup (~3 GB, takes a few minutes).
  # Subsequent starts reuse the ollama_data volume so the model isn't re-downloaded.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 8 && ollama pull gemma3:4b-it-qat && wait"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s

volumes:
  ollama_data:
  node_modules_cache:
  venv_cache:
