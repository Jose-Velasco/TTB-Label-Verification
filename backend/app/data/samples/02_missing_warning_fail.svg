<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <rect width="400" height="600" fill="#f0f4f8" rx="12"/>
  <rect x="20" y="20" width="360" height="560" fill="none" stroke="#4a7c9e" stroke-width="3" rx="8"/>

  <!-- Brand name -->
  <text x="200" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#1a3a52">River Bend</text>
  <line x1="60" y1="135" x2="340" y2="135" stroke="#4a7c9e" stroke-width="1"/>

  <!-- Decorative element -->
  <rect x="140" y="155" width="120" height="100" fill="none" stroke="#4a7c9e" stroke-width="2" rx="4"/>
  <text x="200" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#4a7c9e">RIVER BEND</text>
  <text x="200" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#4a7c9e">SPIRITS</text>

  <!-- Class / Type -->
  <text x="200" y="295" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1a3a52">BOURBON WHISKEY</text>
  <line x1="60" y1="310" x2="340" y2="310" stroke="#4a7c9e" stroke-width="1"/>

  <!-- Alcohol content -->
  <text x="200" y="345" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2c5f7a">43% ALC/VOL (86 PROOF)</text>

  <!-- Net contents -->
