  <text x="200" y="425" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2c5f7a">Nashville TN 37201 USA</text>

  <!-- NOTE: Government warning intentionally MISSING for test purposes -->
  <text x="200" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999">[Government warning omitted — compliance test label]</text>
