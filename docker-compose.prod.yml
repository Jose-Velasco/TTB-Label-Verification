# Production deployment — single Linode host, nginx as the only publicly
# exposed container. See deploy/README.md for full setup instructions
# (DNS, TLS/certbot bootstrap, env vars, verifying streaming works).
#
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env.prod
    restart: unless-stopped
    # Sized for a 4GB/2CPU host: image processing (PIL/cairosvg) is the
    # heaviest thing this container does, so it gets the largest share.
    # backend + frontend + nginx = 2.4 GB, leaving ~1.6 GB for host OS,
    # Docker daemon, and host-installed certbot.
    mem_limit: 2g
    cpus: 1.5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "8080"
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      # Host-installed certbot (see deploy/README.md) writes real certs here;
      # read-only from nginx's side — it only ever reads, never issues.
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Shared ACME HTTP-01 challenge webroot: certbot (host-side) writes
      # challenge tokens here, nginx serves them read-only on port 80 so both
      # initial issuance and every renewal succeed without stopping nginx.
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
