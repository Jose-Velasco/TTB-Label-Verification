# backend and frontend are bound to 127.0.0.1 only — reachable from host
# nginx, not from the public internet directly.
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - .env.prod
    restart: unless-stopped
    # Sized for a smaller host: image processing (PIL/cairosvg) is the
    # heaviest thing this container does, so it gets the largest share.
    # backend + frontend = 2.25 GB
    mem_limit: 2g
    cpus: 1.5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8081:8080"
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
