worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Batch verification allows up to MAX_BATCH_IMAGES (150, see
    # backend/app/constants.py) files at MAX_FILE_SIZE_BYTES (10 MB) each =
    # 1500 MB worst case, +100 MB headroom for multipart boundaries/form
    # fields (application_data_map JSON, etc). Bump this together with those
    # constants if they ever change — don't let it silently drift out of sync.
    client_max_body_size 1600m;

    upstream backend_upstream {
        server backend:8000;
    }

    upstream frontend_upstream {
        server frontend:8080;
    }

    # --- Port 80: redirect to HTTPS, except the ACME HTTP-01 challenge path
    # certbot needs to hit directly (over plain HTTP) to issue/renew the
    # certificate — a blanket redirect here would break both initial
    # issuance and every future renewal. See deploy/README.md for the
    # certbot bootstrap/renewal flow that relies on this location existing.
    server {
        listen 80;
        server_name YOUR_DOMAIN;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name YOUR_DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Reverse-proxy to FastAPI. /api/verify-batch and /api/stress-test/run
        # stream NDJSON results progressively as each image finishes, not all
        # at once — proxy_buffering/proxy_cache here would silently collapse
        # that into one lump response delivered only after the whole batch
        # completes, defeating the entire point of streaming.
        location /api/ {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;

            # Worst-case batch duration, not a guess: a full 150-image batch
            # at the default RATE_LIMIT_RPM=15 (.env.prod.example) runs at
            # max_safe_concurrency()=min(15//4, 200000//39000)=3 (see
            # LiteLLMVisionAdapter.max_safe_concurrency() in
            # backend/app/adapters/litellm_adapter.py), i.e. ceil(150/3)=50
            # sequential rounds * the adapter's own ~6s/call estimate
            # (estimate_seconds()) ~= 300s under ideal conditions. Doubled
            # here for real per-call latency variance and occasional
            # rate-limit retry backoff (up to 6 attempts, see
            # _RATE_LIMIT_MAX_ATTEMPTS) — a short timeout would silently cut
            # the connection mid-batch. Re-derive this if RATE_LIMIT_RPM,
            # OPENAI_TPM_LIMIT, or MAX_BATCH_IMAGES ever change.
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Angular app — the internal frontend container owns SPA fallback
        # (try_files ... /index.html, see frontend/nginx.conf); this just
        # proxies through to it.
        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
