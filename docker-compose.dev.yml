version: "3.9"

services:
  # Local Ollama instance — pulls gemma3:4b on first startup.
  # Provides the vision model for dev so no cloud API key is needed.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # Pull the vision model on container startup
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull gemma3:4b && wait"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s  # model pull takes time

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app  # hot reload
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    environment:
      VISION_MODEL: openai/gemma3:4b
      OLLAMA_API_BASE: http://ollama:11434/v1
    depends_on:
      ollama:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder  # stop at builder stage to get dev deps
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules  # don't overwrite installed node_modules with host dir
    ports:
      - "4200:4200"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  ollama_data:
